name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 bandit
          pip install -r services/user-service/requirements.txt
          pip install -r services/course-service/requirements.txt
          pip install -r services/certificate-service/requirements.txt
          pip install -r requirements-test.txt

      # Flake8 is kept documented but disabled temporarily during MVP stabilization.
      # Re-enable before final delivery when formatting debt is under control.
      # - name: Flake8 check
      #   run: flake8 services tests --max-line-length=120 --extend-ignore=E501,W503

      - name: Pytest user-service
        run: python -m pytest tests/test_user_routes.py -v

      - name: Pytest course-service
        run: python -m pytest tests/test_course_routes.py -v

      - name: Pytest certificate-service
        run: python -m pytest tests/test_certificate_routes.py -v

      - name: Bandit check
        run: bandit -r services

      - name: pip-audit dependency scan
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: >-
            services/user-service/requirements.txt
            services/course-service/requirements.txt
            services/certificate-service/requirements.txt

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build user-service
        run: docker build -f infra/docker/user-service.Dockerfile -t user-service:latest .

      - name: Build course-service
        run: docker build -f infra/docker/course-service.Dockerfile -t course-service:latest .

      - name: Build certificate-service
        run: docker build -f infra/docker/certificate-service.Dockerfile -t certificate-service:latest .

      - name: Login to Docker Hub for Docker Scout
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Scout scan on user-service
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://user-service:latest
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          summary: true

      - name: Docker Scout scan on course-service
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://course-service:latest
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          summary: true

      - name: Docker Scout scan on certificate-service
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://certificate-service:latest
          only-severities: critical,high
          only-fixed: true
          exit-code: true
          summary: true

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }}" >> $GITHUB_ENV

      - name: Build and push user-service
        run: |
          docker build -f infra/docker/user-service.Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}/user-service:${{ github.run_number }} \
            -t ${{ env.IMAGE_PREFIX }}/user-service:latest .
          docker push ${{ env.IMAGE_PREFIX }}/user-service:${{ github.run_number }}
          docker push ${{ env.IMAGE_PREFIX }}/user-service:latest

      - name: Build and push course-service
        run: |
          docker build -f infra/docker/course-service.Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}/course-service:${{ github.run_number }} \
            -t ${{ env.IMAGE_PREFIX }}/course-service:latest .
          docker push ${{ env.IMAGE_PREFIX }}/course-service:${{ github.run_number }}
          docker push ${{ env.IMAGE_PREFIX }}/course-service:latest

      - name: Build and push certificate-service
        run: |
          docker build -f infra/docker/certificate-service.Dockerfile \
            -t ${{ env.IMAGE_PREFIX }}/certificate-service:${{ github.run_number }} \
            -t ${{ env.IMAGE_PREFIX }}/certificate-service:latest .
          docker push ${{ env.IMAGE_PREFIX }}/certificate-service:${{ github.run_number }}
          docker push ${{ env.IMAGE_PREFIX }}/certificate-service:latest
