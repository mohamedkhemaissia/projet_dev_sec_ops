name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install flake8 bandit

      - name: Flake8 check
        run: flake8 services  --max-line-length=100

      - name: Bandit check
        run: bandit -r services

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build user-service
        run: docker build -f infra/docker/user-service.Dockerfile .

      - name: Build course-service
        run: docker build -f infra/docker/course-service.Dockerfile .