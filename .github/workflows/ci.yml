name: CI

on:
push:
branches:
- main
- develop
pull_request:
branches:
- main

jobs:

quality-and-security:
runs-on: ubuntu-latest


steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install tools
    run: |
      python -m pip install --upgrade pip
      pip install flake8 bandit

  - name: Run Flake8
    run: |
      flake8 services

  - name: Run Bandit
    run: |
      bandit -r services

validate-user-service:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    working-directory: services/user-service
    run: |
      pip install -r requirements.txt

  - name: Validate app
    working-directory: services/user-service
    run: |
      python - <<'PY'
      import importlib.util
      from pathlib import Path

      spec = importlib.util.spec_from_file_location(
          'user_service_app',
          Path('app.py')
      )

      module = importlib.util.module_from_spec(spec)
      spec.loader.exec_module(module)

      app = module.create_app()

      assert app.config['SERVICE_NAME'] == 'user-service'
      print('user-service ok')
      PY


validate-course-service:
runs-on: ubuntu-latest


steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    working-directory: services/course-service
    run: |
      pip install -r requirements.txt

  - name: Validate app
    working-directory: services/course-service
    run: |
      python - <<'PY'
      import importlib.util
      from pathlib import Path

      spec = importlib.util.spec_from_file_location(
          'course_service_app',
          Path('app.py')
      )

      module = importlib.util.module_from_spec(spec)
      spec.loader.exec_module(module)

      app = module.create_app()

      assert app.config['SERVICE_NAME'] == 'course-service'
      print('course-service ok')
      PY

docker-build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Build user-service image
    run: |
      docker build \
      -f infra/docker/user-service.Dockerfile \
      -t user-service:test .

  - name: Build course-service image
    run: |
      docker build \
      -f infra/docker/course-service.Dockerfile \
      -t course-service:test .
