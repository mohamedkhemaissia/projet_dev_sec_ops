name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  validate-user-service:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: services/user-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate user-service imports and app startup
        working-directory: services/user-service
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          spec = importlib.util.spec_from_file_location('user_service_app', Path('app.py'))
          module = importlib.util.module_from_spec(spec)
          assert spec and spec.loader
          spec.loader.exec_module(module)
          app = module.create_app()
          assert app.config['SERVICE_NAME'] == 'user-service'
          print('user-service ok')
          PY

  validate-course-service:
