apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: traininghub-services
  namespace: traininghub
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
---
apiVersion: v1
kind: Service
metadata:
  name: user-service-monitored
  namespace: traininghub
  labels:
    monitoring: enabled
spec:
  selector:
    app: user-service
  ports:
  - name: http
    port: 5001
    targetPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: course-service-monitored
  namespace: traininghub
  labels:
    monitoring: enabled
spec:
  selector:
    app: course-service
  ports:
  - name: http
    port: 5002
    targetPort: 5002
---
apiVersion: v1
kind: Service
metadata:
  name: certificate-service-monitored
  namespace: traininghub
  labels:
    monitoring: enabled
spec:
  selector:
    app: certificate-service
  ports:
  - name: http
    port: 5004
    targetPort: 5004
