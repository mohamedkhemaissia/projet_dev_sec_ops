apiVersion: apps/v1
kind: Deployment
metadata:
  name: certificate-service
  namespace: traininghub
  labels:
    app: certificate-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: certificate-service
  template:
    metadata:
      labels:
        app: certificate-service
    spec:
      containers:
        - name: certificate-service
          image: certificate-service:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5004
          envFrom:
            - configMapRef:
                name: traininghub-config
            - secretRef:
                name: traininghub-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/certificates/health
              port: 5004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/certificates/health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: certificate-service
  namespace: traininghub
  labels:
    app: certificate-service
spec:
  type: ClusterIP
  selector:
    app: certificate-service
  ports:
    - name: http
      port: 5004
      targetPort: 5004
