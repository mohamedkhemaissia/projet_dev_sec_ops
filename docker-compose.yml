version: '3.8'
services:
  user-service:
    build: ./infra/docker
    image: user-service:latest
    ports:
      - "5001:5001"
  course-service:
    build: ./infra/docker
    image: course-service:latest
    ports:
      - "5002:5002"
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
